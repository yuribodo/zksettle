name: E2E Tests

on:
  push:
    branches: [dev]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  POSTGRES_PASSWORD: ${{ secrets.E2E_POSTGRES_PASSWORD }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Set fallback password
        if: env.POSTGRES_PASSWORD == ''
        run: echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Start E2E backend
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for api-gateway health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "api-gateway is healthy"
              exit 0
            fi
            echo "Waiting for api-gateway... ($i/30)"
            sleep 5
          done
          echo "api-gateway failed to start"
          docker compose -f docker-compose.e2e.yml logs
          exit 1

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
          NEXT_PUBLIC_SOLANA_NETWORK: devnet

      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: frontend
        env:
          CI: true
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Stop E2E backend
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
