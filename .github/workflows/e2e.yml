name: E2E Tests

on:
  push:
    branches: [dev]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  POSTGRES_PASSWORD: ${{ secrets.E2E_POSTGRES_PASSWORD }}

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set fallback password
        if: env.POSTGRES_PASSWORD == ''
        run: echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Start E2E backend
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for api-gateway health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "api-gateway is healthy"
              exit 0
            fi
            echo "Waiting for api-gateway... ($i/30)"
            sleep 5
          done
          echo "api-gateway failed to start"
          docker compose -f docker-compose.e2e.yml logs
          exit 1

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: frontend

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
          NEXT_PUBLIC_SOLANA_NETWORK: devnet

      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: frontend
        env:
          CI: true
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Stop E2E backend
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
