sonar.projectKey=yuribodo_zksettle
sonar.organization=yuribodo


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=zksettle
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Exclude non-production code from analysis
sonar.exclusions=\
  scripts/**/*,\
  circuits/**/*,\
  docs/**/*,\
  backend/migrations/**/*,\
  **/target/**/*,\
  **/*.lock,\
  sdk/src/idl/**/*

# Reduce duplication noise: require larger blocks to count as duplicated
sonar.cpd.minimumTokens=200
sonar.cpd.minimumLines=25

# Exclude generated/trivial SDK files from duplication
sonar.cpd.exclusions=sdk/src/idl/**/*

# Disable coverage reporting (no test runner wired to SonarCloud)
sonar.coverage.exclusions=**/*
