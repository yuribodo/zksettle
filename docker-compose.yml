services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-zksettle}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD (any non-empty string for local dev; rotate in prod)}"
      POSTGRES_DB: "${POSTGRES_DB:-zksettle_gateway}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-dbs.sql:/docker-entrypoint-initdb.d/10-test-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zksettle"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      SERVICE: "api-gateway"
      GATEWAY_PORT: "4000"
      GATEWAY_UPSTREAM_URL: "http://issuer-service:3000"
      GATEWAY_INDEXER_URL: "http://indexer:3001"
      GATEWAY_DATABASE_URL: "postgres://${POSTGRES_USER:-zksettle}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zksettle_gateway}"
      GATEWAY_ALLOW_OPEN_KEYS: "true"
      GATEWAY_JWT_SECRET: "${GATEWAY_JWT_SECRET:?set GATEWAY_JWT_SECRET}"
      GATEWAY_SIWS_DOMAIN: "${GATEWAY_SIWS_DOMAIN:-localhost:3000}"
      # Browser callers (frontend dev server) require an explicit origin
      # whitelist; without it the gateway logs a startup warning and CORS
      # preflights fail. Comma-separated list; defaults to the Next.js dev
      # origin so a fresh `docker compose up` works in a browser.
      GATEWAY_CORS_ALLOWED_ORIGINS: "${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
      GATEWAY_UPSTREAM_TOKEN: "${API_TOKEN:-}"
    depends_on:
      postgres:
        condition: service_healthy

  issuer-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      SERVICE: "issuer-service"
      LISTEN_ADDR: "0.0.0.0:3000"
      PROGRAM_ID: "${PROGRAM_ID:?set PROGRAM_ID}"
      KEYPAIR_PATH: "/keys/id.json"
      RPC_URL: "${RPC_URL:-http://127.0.0.1:8899}"
      API_TOKEN: "${API_TOKEN:-}"
      # Sunspot Groth16 prover wiring. Paths point at artefacts baked into
      # the image (see backend/Dockerfile). Removing any of these four vars
      # leaves /prove/groth16 unmounted -> 404.
      SUNSPOT_BIN: "/usr/local/bin/sunspot"
      SUNSPOT_ACIR_PATH: "/artefacts/zksettle_slice.json"
      SUNSPOT_CCS_PATH: "/artefacts/zksettle_slice.ccs"
      SUNSPOT_PK_PATH: "/artefacts/zksettle_slice.pk"
    volumes:
      - ${KEYPAIR_FILE:-~/.config/solana/id.json}:/keys/id.json:ro

  indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      SERVICE: "indexer"
      INDEXER_PORT: "3001"
      INDEXER_HELIUS_AUTH_TOKEN: "${INDEXER_HELIUS_AUTH_TOKEN:?set INDEXER_HELIUS_AUTH_TOKEN}"
      INDEXER_PROGRAM_ID: "${INDEXER_PROGRAM_ID:?set INDEXER_PROGRAM_ID}"
      INDEXER_DATABASE_URL: "postgres://${POSTGRES_USER:-zksettle}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zksettle_gateway}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - indexer_data:/data

volumes:
  pgdata:
  indexer_data:
