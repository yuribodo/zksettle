services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zksettle
      POSTGRES_PASSWORD: zksettle_dev
      POSTGRES_DB: zksettle_gateway
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-dbs.sql:/docker-entrypoint-initdb.d/10-test-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zksettle"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api-gateway
    ports:
      - "4000:4000"
    environment:
      GATEWAY_PORT: "4000"
      GATEWAY_UPSTREAM_URL: "http://issuer-service:3000"
      GATEWAY_INDEXER_URL: "http://indexer:3001"
      GATEWAY_DATABASE_URL: "postgres://zksettle:zksettle_dev@postgres:5432/zksettle_gateway"
      GATEWAY_ALLOW_OPEN_KEYS: "true"
    depends_on:
      postgres:
        condition: service_healthy

  issuer-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: issuer-service
    ports:
      - "3000:3000"
    environment:
      LISTEN_ADDR: "0.0.0.0:3000"
      PROGRAM_ID: "${PROGRAM_ID:?set PROGRAM_ID}"
      KEYPAIR_PATH: "/keys/id.json"
      RPC_URL: "${RPC_URL:-http://127.0.0.1:8899}"
    volumes:
      - ${KEYPAIR_FILE:-~/.config/solana/id.json}:/keys/id.json:ro

  indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: indexer
    ports:
      - "3001:3001"
    environment:
      INDEXER_PORT: "3001"
      INDEXER_HELIUS_AUTH_TOKEN: "${INDEXER_HELIUS_AUTH_TOKEN:?set INDEXER_HELIUS_AUTH_TOKEN}"
      INDEXER_PROGRAM_ID: "${INDEXER_PROGRAM_ID:?set INDEXER_PROGRAM_ID}"
      INDEXER_DATABASE_URL: "postgres://zksettle:zksettle_dev@postgres:5432/zksettle_gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - indexer_data:/data

volumes:
  pgdata:
  indexer_data:
